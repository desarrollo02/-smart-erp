services:

 postgres:
   image: postgres:16
   container_name: erp-postgres
   environment:
     POSTGRES_DB: erpdb
     POSTGRES_USER: erpuser
     POSTGRES_PASSWORD: 1234
   ports:
     - "5433:5432"
   volumes:
     - erp_postgres_data:/var/lib/postgresql/data

 wildfly:
   build:
     context: ../wildfly
     dockerfile: Dockerfile
   container_name: erp-wildfly
   ports:
     - "8080:8080"
     - "9990:9990"
   depends_on:
     - postgres

volumes:
 erp_postgres_data: